<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Pixelwise</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#000000;
      --muted:#666666;
      --border:#e7e7e7;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter, system-ui, Arial, sans-serif;
    }

    a{color:inherit;text-decoration:none}
    button,input{font:inherit}

    header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      background:#fff;
      z-index:10;
      padding:18px 28px;
    }

    .brand{
      font-weight:600;
      font-size:18px;
      letter-spacing:-0.02em;
    }

    main{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:120px 20px 60px;
    }

    .wrap{
      width:100%;
      max-width:360px;
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.05;
      font-weight:600;
      letter-spacing:-0.03em;
    }

    .sub{
      margin:0 0 28px;
      font-size:14px;
      color:var(--muted);
    }

    form{
      display:block;
    }

    .hidden{
      display:none;
    }

    input{
      width:100%;
      height:44px;
      border:1px solid var(--border);
      border-radius:8px;
      padding:0 12px;
      font-size:14px;
      margin-bottom:12px;
      background:#fff;
      color:#000;
      outline:none;
    }

    input:focus{
      border-color:#000;
    }

    button{
      width:100%;
      height:44px;
      border:none;
      border-radius:8px;
      background:#000;
      color:#fff;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
    }

    button:disabled{
      opacity:.7;
      cursor:default;
    }

    .alt{
      margin-top:12px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      cursor:pointer;
      user-select:none;
    }

    .alt:hover{
      color:#000;
    }

    .message{
      margin-top:14px;
      font-size:13px;
      line-height:1.45;
      color:var(--muted);
      min-height:20px;
    }

    .message.success{
      color:#111;
    }

    .meta{
      margin-top:18px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
    }

    @media (max-width: 600px){
      main{
        padding:100px 16px 40px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="/index.html" class="brand">Pixelwise</a>
  </header>

  <main>
    <div class="wrap">
      <h1>Login</h1>
      <div class="sub">Fast, simple access to your library</div>

      <form id="magic-form">
        <input type="email" id="magic-email" placeholder="Email" autocomplete="email" required />
        <button type="submit" id="magic-button">Send login link</button>
      </form>

      <form id="password-form" class="hidden">
        <input type="email" id="password-email" placeholder="Email" autocomplete="email" required />
        <input type="password" id="password-value" placeholder="Password" autocomplete="current-password" required />
        <button type="submit" id="password-button">Login</button>
      </form>

      <div class="alt" id="toggle-mode" role="button" tabindex="0">Use password instead</div>

      <div class="message" id="message"></div>

      <div class="meta">New here? Get access with a Pixelwise pack.</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const SUPABASE_URL = "https://zytcznhxiszqypflgvhz.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_g-lpsZTEaID3cbgEPQyA2Q_dnDNDyAv";

      const magicForm = document.getElementById("magic-form");
      const passwordForm = document.getElementById("password-form");
      const toggleMode = document.getElementById("toggle-mode");
      const messageEl = document.getElementById("message");
      const magicButton = document.getElementById("magic-button");
      const passwordButton = document.getElementById("password-button");

      let mode = "magic";
      let supabase = null;

      function setMessage(text, kind = "") {
        messageEl.textContent = text;
        messageEl.className = "message" + (kind ? " " + kind : "");
      }

      function setLoading(isLoading) {
        if (magicButton) magicButton.disabled = isLoading;
        if (passwordButton) passwordButton.disabled = isLoading;
      }

      function switchMode() {
        setMessage("");

        if (mode === "magic") {
          mode = "password";
          magicForm.classList.add("hidden");
          passwordForm.classList.remove("hidden");
          toggleMode.textContent = "Use magic link instead";
        } else {
          mode = "magic";
          passwordForm.classList.add("hidden");
          magicForm.classList.remove("hidden");
          toggleMode.textContent = "Use password instead";
        }
      }

      toggleMode.addEventListener("click", switchMode);
      toggleMode.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          switchMode();
        }
      });

      try {
        if (window.supabase && typeof window.supabase.createClient === "function") {
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
          setMessage("Supabase failed to load.");
        }
      } catch (err) {
        setMessage("There was a problem loading login services.");
      }

      async function redirectIfLoggedIn() {
        if (!supabase) return;

        try {
          const { data, error } = await supabase.auth.getSession();
          if (!error && data?.session) {
            window.location.href = "/library";
          }
        } catch (err) {
          // do nothing; page should still function
        }
      }

      magicForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        setMessage("");

        if (!supabase) {
          setMessage("Login service is unavailable right now.");
          return;
        }

        setLoading(true);

        try {
          const email = document.getElementById("magic-email").value.trim();

          const { error } = await supabase.auth.signInWithOtp({
            email,
            options: {
              emailRedirectTo: window.location.origin + "/library"
            }
          });

          if (error) {
            setMessage(error.message);
            return;
          }

          setMessage("Check your email. We sent you a secure login link.", "success");
          magicForm.classList.add("hidden");
          toggleMode.classList.add("hidden");
        } catch (err) {
          setMessage("Something went wrong sending the login link.");
        } finally {
          setLoading(false);
        }
      });

      passwordForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        setMessage("");

        if (!supabase) {
          setMessage("Login service is unavailable right now.");
          return;
        }

        setLoading(true);

        try {
          const email = document.getElementById("password-email").value.trim();
          const password = document.getElementById("password-value").value;

          const { error } = await supabase.auth.signInWithPassword({
            email,
            password
          });

          if (error) {
            setMessage(error.message);
            return;
          }

          window.location.href = "/library";
        } catch (err) {
          setMessage("Something went wrong logging you in.");
        } finally {
          setLoading(false);
        }
      });

      redirectIfLoggedIn();
    });
  </script>
</body>
</html>
